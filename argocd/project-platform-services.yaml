apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-services
  namespace: argocd
spec:
  description: Platform-managed service deployments
  sourceRepos:
    - "https://github.com/worldretouch/platform-env.git"
    - "https://github.com/worldretouch/platform-idp.git"
  destinations:
    - namespace: argocd
      server: "https://kubernetes.default.svc"
    - namespace: platform-dev
      server: "https://kubernetes.default.svc"
    - namespace: platform-staging
      server: "https://kubernetes.default.svc"
    - namespace: platform-prod
      server: "https://kubernetes.default.svc"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceBlacklist:
    - group: ""
      kind: ResourceQuota

