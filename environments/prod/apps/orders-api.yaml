apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orders-api-prod
  namespace: argocd
spec:
  project: platform-services
  sources:
    - repoURL: https://github.com/worldretouch/platform-idp.git
      targetRevision: main
      path: shared/helm/platform-service
      helm:
        valueFiles:
          - $values/environments/prod/values/orders-api.values.yaml
    - repoURL: https://github.com/worldretouch/platform-env.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

