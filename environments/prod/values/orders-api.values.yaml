service:
  name: orders-api
  port: 3000
  replicas: 3

image:
  repository: ghcr.io/worldretouch
  tag: "prod-sha-REPLACE_ME"
  pullPolicy: IfNotPresent

# Create a docker-registry secret named ghcr-pull in this namespace (e.g. kubectl create secret docker-registry ...).
# Change the name below if your team uses a different secret name.
imagePullSecrets:
  - name: ghcr-pull

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65

env:
  APP_ENV: production
  LOG_LEVEL: info

existingSecret: ""

